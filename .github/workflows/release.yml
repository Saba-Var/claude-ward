name: Release
on:
  push:
    tags: ['v*']

# id-token lets npm attach a provenance attestation to the published package,
# which matters for a tool that defends against supply-chain tampering.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted Publishing authenticates over OIDC instead of a token, and
      # needs a recent npm. The id-token permission above is what it relies on.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # prepublishOnly re-runs the gate; --provenance pairs with id-token above.
      - run: npm publish --provenance --access public
